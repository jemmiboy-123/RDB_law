{% extends "base.html" %}
{% block content %}
<div class="topbar"><h1>User Administration</h1></div>
<form method="post" class="card form-grid" style="margin-bottom:12px;">
  <div class="grid-2">
    <label>Full Name<input name="full_name" required></label>
    <label>Email<input type="email" name="email" required></label>
  </div>
  <div class="grid-2">
    <label>Password<input type="password" name="password" required></label>
    <label>Role<select name="role"><option value="admin">Admin</option><option value="lawyer">Lawyer</option><option value="staff">Staff</option><option value="client">Client</option></select></label>
  </div>
  <div><button type="submit">Create User</button></div>
</form>
<section class="card table-wrap">
<table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Created</th></tr></thead><tbody>
  {% for u in users %}
  <tr><td>{{ u.full_name }}</td><td>{{ u.email }}</td><td><span class="badge">{{ u.role }}</span></td><td>{{ u.created_at.strftime('%Y-%m-%d') }}</td></tr>
  {% else %}<tr><td colspan="4">No users found.</td></tr>{% endfor %}
</tbody></table>
</section>
{% endblock %}
